<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 640" width="800" height="640">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="green2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3fb950"/>
      <stop offset="100%" style="stop-color:#56d364"/>
    </linearGradient>
    <linearGradient id="red2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f85149"/>
      <stop offset="100%" style="stop-color:#ff7b72"/>
    </linearGradient>
    <linearGradient id="yellow2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d29922"/>
      <stop offset="100%" style="stop-color:#e3b341"/>
    </linearGradient>
    <linearGradient id="purple2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8957e5"/>
      <stop offset="100%" style="stop-color:#bc8cff"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="640" rx="12" fill="url(#bg2)"/>
  <rect x="1" y="1" width="798" height="638" rx="12" fill="none" stroke="#30363d" stroke-width="1"/>

  <!-- Title bar -->
  <rect width="800" height="36" rx="12" fill="#161b22"/>
  <rect y="24" width="800" height="12" fill="#161b22"/>
  <circle cx="20" cy="18" r="6" fill="#f85149"/>
  <circle cx="40" cy="18" r="6" fill="#d29922"/>
  <circle cx="60" cy="18" r="6" fill="#3fb950"/>
  <text x="400" y="22" text-anchor="middle" font-family="SF Mono,Menlo,monospace" font-size="12" fill="#8b949e">voronoi &#x2014; scientific discovery engine</text>

  <!-- ══════════════════════════════════════════════════════════════ -->
  <!-- PHASE 1: Question + Classify (0.5s–2s) -->
  <!-- ══════════════════════════════════════════════════════════════ -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="0.5s" dur="0.4s" fill="freeze"/>
    <text x="30" y="60" font-family="SF Mono,Menlo,monospace" font-size="13" fill="#8b949e">you</text>
    <text x="30" y="78" font-family="SF Mono,Menlo,monospace" font-size="13" fill="#e6edf3">Which mechanisms best mitigate catastrophic forgetting?</text>
  </g>

  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="1.8s" dur="0.4s" fill="freeze"/>
    <text x="30" y="108" font-family="SF Mono,Menlo,monospace" font-size="12" fill="#8b949e">&#x1F3F7; </text>
    <text x="52" y="108" font-family="SF Mono,Menlo,monospace" font-size="12" font-weight="bold" fill="#bc8cff">Hybrid</text>
    <text x="115" y="108" font-family="SF Mono,Menlo,monospace" font-size="12" fill="#8b949e"> &#xB7; rigor: </text>
    <text x="195" y="108" font-family="SF Mono,Menlo,monospace" font-size="12" font-weight="bold" fill="#d29922">Scientific</text>
    <text x="290" y="108" font-family="SF Mono,Menlo,monospace" font-size="12" fill="#8b949e"> &#xB7; investigate &#x2192; synthesize &#x2192; manuscript</text>
  </g>

  <!-- ══════════════════════════════════════════════════════════════ -->
  <!-- PHASE 2: Scout + Hypotheses (2.5s–4s) -->
  <!-- ══════════════════════════════════════════════════════════════ -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="2.8s" dur="0.3s" fill="freeze"/>
    <text x="30" y="136" font-family="SF Mono,Menlo,monospace" font-size="12" fill="#58a6ff">&#x1F50D; Scout</text>
    <text x="110" y="136" font-family="SF Mono,Menlo,monospace" font-size="12" fill="#8b949e"> literature review &#x2192; 3 competing hypotheses</text>
  </g>

  <!-- Belief map initial -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="3.3s" dur="0.3s" fill="freeze"/>
    <rect x="530" y="120" width="240" height="66" rx="6" fill="#161b22" stroke="#30363d"/>
    <text x="546" y="137" font-family="SF Mono,Menlo,monospace" font-size="9" font-weight="bold" fill="#8b949e">BELIEF MAP</text>
    <text x="546" y="153" font-family="SF Mono,Menlo,monospace" font-size="10" fill="#d29922">H1 EWC alone       P=0.30</text>
    <text x="546" y="166" font-family="SF Mono,Menlo,monospace" font-size="10" fill="#d29922">H2 Replay alone    P=0.30</text>
    <text x="546" y="179" font-family="SF Mono,Menlo,monospace" font-size="10" fill="#d29922">H3 EWC+Replay      P=0.40</text>
  </g>

  <!-- ══════════════════════════════════════════════════════════════ -->
  <!-- PHASE 3: Wave 1 — 3 parallel agents (4s–8s) -->
  <!-- ══════════════════════════════════════════════════════════════ -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="4s" dur="0.2s" fill="freeze"/>
    <text x="30" y="206" font-family="SF Mono,Menlo,monospace" font-size="11" font-weight="bold" fill="#58a6ff">WAVE 1</text>
    <text x="100" y="206" font-family="SF Mono,Menlo,monospace" font-size="11" fill="#8b949e">3 agents dispatched</text>
  </g>

  <!-- Agent H1 -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="4.3s" dur="0.2s" fill="freeze"/>
    <rect x="30" y="214" width="240" height="40" rx="6" fill="#161b22" stroke="#30363d"/>
    <text x="44" y="230" font-family="SF Mono,Menlo,monospace" font-size="10" fill="#58a6ff">&#x1F52C; H1: EWC alone</text>
    <rect x="44" y="238" width="0" height="3" rx="1.5" fill="url(#green2)">
      <animate attributeName="width" values="0;210" begin="4.8s" dur="3.2s" fill="freeze"/>
    </rect>
  </g>

  <!-- Agent H2 -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="4.5s" dur="0.2s" fill="freeze"/>
    <rect x="280" y="214" width="240" height="40" rx="6" fill="#161b22" stroke="#30363d"/>
    <text x="294" y="230" font-family="SF Mono,Menlo,monospace" font-size="10" fill="#58a6ff">&#x1F52C; H2: Experience replay</text>
    <rect x="294" y="238" width="0" height="3" rx="1.5" fill="url(#red2)">
      <animate attributeName="width" values="0;170;170" begin="4.8s" dur="2.5s" fill="freeze"/>
    </rect>
  </g>

  <!-- Agent H3 -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="4.7s" dur="0.2s" fill="freeze"/>
    <rect x="530" y="214" width="240" height="40" rx="6" fill="#161b22" stroke="#30363d"/>
    <text x="544" y="230" font-family="SF Mono,Menlo,monospace" font-size="10" fill="#58a6ff">&#x1F52C; H3: EWC+Replay hybrid</text>
    <rect x="544" y="238" width="0" height="3" rx="1.5" fill="url(#yellow2)">
      <animate attributeName="width" values="0;210" begin="4.8s" dur="3.5s" fill="freeze"/>
    </rect>
  </g>

  <!-- ══════════════════════════════════════════════════════════════ -->
  <!-- PHASE 4: Wave 1 results — mixed (8s–9.5s) -->
  <!-- ══════════════════════════════════════════════════════════════ -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="8.5s" dur="0.3s" fill="freeze"/>
    <text x="30" y="274" font-family="SF Mono,Menlo,monospace" font-size="10" fill="#3fb950">&#x2705; H1: d=0.34, CI [0.12, 0.56]  marginal</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="8.9s" dur="0.3s" fill="freeze"/>
    <text x="280" y="274" font-family="SF Mono,Menlo,monospace" font-size="10" fill="#f85149">&#x274C; H2: FAILED &#x2014; replay bug, low N</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="9.3s" dur="0.3s" fill="freeze"/>
    <text x="530" y="274" font-family="SF Mono,Menlo,monospace" font-size="10" fill="#d29922">&#x2753; H3: d=0.91, CI [0.44, 1.38]  promising</text>
  </g>

  <!-- ══════════════════════════════════════════════════════════════ -->
  <!-- PHASE 5: OODA feedback loop (9.5s–12s) -->
  <!-- ══════════════════════════════════════════════════════════════ -->

  <!-- Loop arrow -->
  <g opacity="0" filter="url(#glow2)">
    <animate attributeName="opacity" values="0;1" begin="10s" dur="0.5s" fill="freeze"/>
    <rect x="30" y="288" width="740" height="56" rx="8" fill="#1c1226" stroke="#8957e5" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="50" y="308" font-family="SF Mono,Menlo,monospace" font-size="11" font-weight="bold" fill="#bc8cff">&#x1F504; OODA LOOP</text>
    <text x="160" y="308" font-family="SF Mono,Menlo,monospace" font-size="11" fill="#8b949e">Observe: H2 failed, H3 needs replication</text>
    <text x="50" y="326" font-family="SF Mono,Menlo,monospace" font-size="11" fill="#8b949e">Orient: replay bug identified &#x2192; Decide: retry H2 with fix + replicate H3</text>
    <text x="50" y="338" font-family="SF Mono,Menlo,monospace" font-size="11" fill="#bc8cff">Act: new hypothesis H4 (replay with correct buffer) + H3 replication</text>
  </g>

  <!-- Belief map update -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="11s" dur="0.4s" fill="freeze"/>
    <rect x="530" y="120" width="240" height="66" rx="6" fill="#161b22" stroke="#8957e5"/>
    <text x="546" y="137" font-family="SF Mono,Menlo,monospace" font-size="9" font-weight="bold" fill="#bc8cff">BELIEF MAP (updated)</text>
    <text x="546" y="153" font-family="SF Mono,Menlo,monospace" font-size="10" fill="#3fb950">H1 EWC alone       P=0.15 &#x2193;</text>
    <text x="546" y="166" font-family="SF Mono,Menlo,monospace" font-size="10" fill="#f85149">H2 Replay alone    P=0.10 &#x2193;</text>
    <text x="546" y="179" font-family="SF Mono,Menlo,monospace" font-size="10" fill="#d29922">H3 EWC+Replay      P=0.55 &#x2191;</text>
  </g>

  <!-- ══════════════════════════════════════════════════════════════ -->
  <!-- PHASE 6: Wave 2 — retry + replicate (12s–15s) -->
  <!-- ══════════════════════════════════════════════════════════════ -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="12s" dur="0.2s" fill="freeze"/>
    <text x="30" y="366" font-family="SF Mono,Menlo,monospace" font-size="11" font-weight="bold" fill="#58a6ff">WAVE 2</text>
    <text x="100" y="366" font-family="SF Mono,Menlo,monospace" font-size="11" fill="#8b949e">2 agents (informed by wave 1 failures)</text>
  </g>

  <!-- Agent H4 (new hypothesis from failure) -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="12.3s" dur="0.2s" fill="freeze"/>
    <rect x="30" y="374" width="370" height="40" rx="6" fill="#161b22" stroke="#8957e5"/>
    <text x="44" y="390" font-family="SF Mono,Menlo,monospace" font-size="10" fill="#bc8cff">&#x1F52C; H4: Replay (fixed buffer, N=500)</text>
    <text x="322" y="390" font-family="SF Mono,Menlo,monospace" font-size="9" fill="#8b949e">&#x2190; from H2</text>
    <rect x="44" y="400" width="0" height="3" rx="1.5" fill="url(#green2)">
      <animate attributeName="width" values="0;340" begin="12.8s" dur="2.5s" fill="freeze"/>
    </rect>
  </g>

  <!-- Agent H3 replication -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="12.5s" dur="0.2s" fill="freeze"/>
    <rect x="410" y="374" width="360" height="40" rx="6" fill="#161b22" stroke="#d29922"/>
    <text x="424" y="390" font-family="SF Mono,Menlo,monospace" font-size="10" fill="#d29922">&#x1F52C; H3: EWC+Replay (replication, 3 seeds)</text>
    <rect x="424" y="400" width="0" height="3" rx="1.5" fill="url(#green2)">
      <animate attributeName="width" values="0;330" begin="12.8s" dur="2.8s" fill="freeze"/>
    </rect>
  </g>

  <!-- Wave 2 results -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="15.8s" dur="0.3s" fill="freeze"/>
    <text x="30" y="432" font-family="SF Mono,Menlo,monospace" font-size="10" fill="#3fb950">&#x2705; H4: d=0.52, CI [0.31, 0.73], p&lt;.01</text>
    <text x="410" y="432" font-family="SF Mono,Menlo,monospace" font-size="10" fill="#3fb950">&#x2705; H3: d=1.47, CI [1.12, 1.83], p&lt;.001 REPLICATED</text>
  </g>

  <!-- ══════════════════════════════════════════════════════════════ -->
  <!-- PHASE 7: Convergence + final belief map (16s–17s) -->
  <!-- ══════════════════════════════════════════════════════════════ -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="16.5s" dur="0.4s" fill="freeze"/>
    <rect x="530" y="120" width="240" height="66" rx="6" fill="#161b22" stroke="#3fb950"/>
    <text x="546" y="137" font-family="SF Mono,Menlo,monospace" font-size="9" font-weight="bold" fill="#3fb950">BELIEF MAP (converged)</text>
    <text x="546" y="153" font-family="SF Mono,Menlo,monospace" font-size="10" fill="#8b949e">H1 EWC alone       P=0.10</text>
    <text x="546" y="166" font-family="SF Mono,Menlo,monospace" font-size="10" fill="#8b949e">H4 Replay fixed    P=0.15</text>
    <text x="546" y="179" font-family="SF Mono,Menlo,monospace" font-size="10" fill="#3fb950">H3 EWC+Replay      P=0.75 &#x2705;</text>
  </g>

  <!-- ══════════════════════════════════════════════════════════════ -->
  <!-- PHASE 8: Manuscript assembly (17s–20s) -->
  <!-- ══════════════════════════════════════════════════════════════ -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="17.5s" dur="0.3s" fill="freeze"/>
    <text x="30" y="460" font-family="SF Mono,Menlo,monospace" font-size="12" fill="#bc8cff">&#x1F3C1; Discovery converged &#x2014; assembling manuscript</text>
  </g>

  <!-- Manuscript box -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="18s" dur="0.3s" fill="freeze"/>
    <rect x="30" y="472" width="740" height="130" rx="8" fill="#161b22" stroke="#8957e5" stroke-width="1.5"/>
    <text x="50" y="492" font-family="SF Mono,Menlo,monospace" font-size="11" font-weight="bold" fill="#bc8cff">manuscript.pdf</text>
  </g>

  <!-- Section chips -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="18.4s" dur="0.15s" fill="freeze"/>
    <rect x="50" y="502" width="75" height="20" rx="4" fill="#1f2937" stroke="#8957e5" stroke-width="0.5"/>
    <text x="87" y="516" text-anchor="middle" font-family="SF Mono,Menlo,monospace" font-size="9" fill="#bc8cff">Abstract</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="18.6s" dur="0.15s" fill="freeze"/>
    <rect x="133" y="502" width="92" height="20" rx="4" fill="#1f2937" stroke="#8957e5" stroke-width="0.5"/>
    <text x="179" y="516" text-anchor="middle" font-family="SF Mono,Menlo,monospace" font-size="9" fill="#bc8cff">Introduction</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="18.8s" dur="0.15s" fill="freeze"/>
    <rect x="233" y="502" width="75" height="20" rx="4" fill="#1f2937" stroke="#8957e5" stroke-width="0.5"/>
    <text x="270" y="516" text-anchor="middle" font-family="SF Mono,Menlo,monospace" font-size="9" fill="#bc8cff">Methods</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="19s" dur="0.15s" fill="freeze"/>
    <rect x="316" y="502" width="68" height="20" rx="4" fill="#1f2937" stroke="#3fb950" stroke-width="0.5"/>
    <text x="350" y="516" text-anchor="middle" font-family="SF Mono,Menlo,monospace" font-size="9" fill="#3fb950">Results</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="19.2s" dur="0.15s" fill="freeze"/>
    <rect x="392" y="502" width="82" height="20" rx="4" fill="#1f2937" stroke="#8957e5" stroke-width="0.5"/>
    <text x="433" y="516" text-anchor="middle" font-family="SF Mono,Menlo,monospace" font-size="9" fill="#bc8cff">Discussion</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="19.4s" dur="0.15s" fill="freeze"/>
    <rect x="482" y="502" width="82" height="20" rx="4" fill="#1f2937" stroke="#8957e5" stroke-width="0.5"/>
    <text x="523" y="516" text-anchor="middle" font-family="SF Mono,Menlo,monospace" font-size="9" fill="#bc8cff">References</text>
  </g>

  <!-- Key findings inside manuscript -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="19.8s" dur="0.3s" fill="freeze"/>
    <text x="50" y="546" font-family="SF Mono,Menlo,monospace" font-size="10" fill="#3fb950">&#x2705; EWC+Replay hybrid: d=1.47, CI [1.12, 1.83], p&lt;.001 &#x2014; REPLICATED across 3 seeds</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="20.2s" dur="0.3s" fill="freeze"/>
    <text x="50" y="562" font-family="SF Mono,Menlo,monospace" font-size="10" fill="#8b949e">&#x2705; Replay (fixed): d=0.52, CI [0.31, 0.73], p&lt;.01 &#x2014; moderate, single seed</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="20.6s" dur="0.3s" fill="freeze"/>
    <text x="50" y="578" font-family="SF Mono,Menlo,monospace" font-size="10" fill="#8b949e">&#x2705; EWC alone: d=0.34, CI [0.12, 0.56], p&lt;.05 &#x2014; marginal</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="21s" dur="0.3s" fill="freeze"/>
    <text x="50" y="594" font-family="SF Mono,Menlo,monospace" font-size="10" fill="#f85149">&#x274C; Replay (original): REFUTED &#x2014; implementation bug identified in wave 1</text>
  </g>

  <!-- Footer -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="21.5s" dur="0.4s" fill="freeze"/>
    <text x="30" y="618" font-family="SF Mono,Menlo,monospace" font-size="11" fill="#8b949e">Reviewed: Statistician &#x2705; &#xB7; Critic &#x2705; &#xB7; Methodologist &#x2705;</text>
    <text x="520" y="618" font-family="SF Mono,Menlo,monospace" font-size="11" fill="#8b949e">4 findings &#xB7; 2 waves &#xB7; 5 agents &#xB7; 47min</text>
  </g>

</svg>
