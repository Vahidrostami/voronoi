<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <linearGradient id="bg-light" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f6f8fa"/>
    </linearGradient>
    <filter id="glowl">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglowl">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="200" rx="12" fill="url(#bg-light)"/>

  <!-- Voronoi cell mesh -->
  <path d="M0,100 L45,20 L130,8 L155,75 L120,140 L50,170 L0,150Z" fill="#58a6ff" fill-opacity="0.06" stroke="#58a6ff" stroke-width="0.8" stroke-opacity="0.25">
    <animate attributeName="stroke-opacity" values="0.15;0.4;0.15" dur="4s" repeatCount="indefinite"/>
  </path>
  <path d="M130,8 L250,5 L280,70 L260,130 L155,75Z" fill="#d29922" fill-opacity="0.06" stroke="#d29922" stroke-width="0.8" stroke-opacity="0.25">
    <animate attributeName="stroke-opacity" values="0.15;0.4;0.15" dur="3.5s" begin="0.5s" repeatCount="indefinite"/>
  </path>
  <path d="M250,5 L390,12 L400,90 L350,145 L280,70Z" fill="#1a7f37" fill-opacity="0.06" stroke="#1a7f37" stroke-width="0.8" stroke-opacity="0.25">
    <animate attributeName="stroke-opacity" values="0.15;0.4;0.15" dur="3.8s" begin="1s" repeatCount="indefinite"/>
  </path>
  <path d="M390,12 L510,8 L540,80 L500,140 L400,90Z" fill="#8957e5" fill-opacity="0.07" stroke="#8957e5" stroke-width="0.8" stroke-opacity="0.25">
    <animate attributeName="stroke-opacity" values="0.15;0.5;0.15" dur="3.2s" begin="0.3s" repeatCount="indefinite"/>
  </path>
  <path d="M510,8 L640,15 L660,95 L610,155 L540,80Z" fill="#cf222e" fill-opacity="0.06" stroke="#cf222e" stroke-width="0.8" stroke-opacity="0.25">
    <animate attributeName="stroke-opacity" values="0.15;0.4;0.15" dur="4.2s" begin="0.7s" repeatCount="indefinite"/>
  </path>
  <path d="M640,15 L780,10 L810,85 L760,150 L660,95Z" fill="#1a7f37" fill-opacity="0.06" stroke="#1a7f37" stroke-width="0.8" stroke-opacity="0.25">
    <animate attributeName="stroke-opacity" values="0.15;0.4;0.15" dur="3.6s" begin="1.2s" repeatCount="indefinite"/>
  </path>
  <path d="M780,10 L900,0 L900,200 L810,170 L810,85Z" fill="#656d76" fill-opacity="0.04" stroke="#656d76" stroke-width="0.8" stroke-opacity="0.2">
    <animate attributeName="stroke-opacity" values="0.1;0.3;0.1" dur="5s" begin="0.4s" repeatCount="indefinite"/>
  </path>
  <path d="M0,150 L50,170 L120,140 L155,75 L260,130 L350,145 L280,192 L140,195 L0,200Z" fill="#d29922" fill-opacity="0.04" stroke="#d29922" stroke-width="0.6" stroke-opacity="0.2">
    <animate attributeName="stroke-opacity" values="0.1;0.35;0.1" dur="4.5s" begin="0.8s" repeatCount="indefinite"/>
  </path>
  <path d="M280,192 L350,145 L400,90 L500,140 L610,155 L560,192 L420,198Z" fill="#8957e5" fill-opacity="0.04" stroke="#8957e5" stroke-width="0.6" stroke-opacity="0.2">
    <animate attributeName="stroke-opacity" values="0.1;0.35;0.1" dur="3.9s" begin="1.5s" repeatCount="indefinite"/>
  </path>
  <path d="M560,192 L610,155 L660,95 L760,150 L810,170 L900,200 L700,198Z" fill="#1a7f37" fill-opacity="0.04" stroke="#1a7f37" stroke-width="0.6" stroke-opacity="0.2">
    <animate attributeName="stroke-opacity" values="0.1;0.35;0.1" dur="4.1s" begin="0.6s" repeatCount="indefinite"/>
  </path>

  <!-- Particles -->
  <circle r="2" fill="#0969da" filter="url(#glowl)" opacity="0.7">
    <animateMotion dur="6s" repeatCount="indefinite" path="M155,75 L280,70 L400,90 L540,80 L660,95 L810,85"/>
  </circle>
  <circle r="1.5" fill="#1a7f37" filter="url(#glowl)" opacity="0.6">
    <animateMotion dur="5s" repeatCount="indefinite" begin="1.5s" path="M810,85 L660,95 L540,80 L400,90 L280,70 L155,75"/>
  </circle>
  <circle r="1.5" fill="#8957e5" filter="url(#glowl)" opacity="0.6">
    <animateMotion dur="7s" repeatCount="indefinite" begin="0.8s" path="M50,170 L155,75 L400,90 L610,155 L810,170"/>
  </circle>
  <circle r="2" fill="#d29922" filter="url(#glowl)" opacity="0.5">
    <animateMotion dur="4.5s" repeatCount="indefinite" begin="2s" path="M120,140 L260,130 L350,145 L500,140 L610,155 L760,150"/>
  </circle>

  <!-- Title -->
  <text x="450" y="82" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="42" font-weight="700" fill="#1f2328" letter-spacing="-1">Voronoi</text>
  <text x="450" y="115" text-anchor="middle" font-family="SF Mono,Menlo,monospace" font-size="14" fill="#656d76" letter-spacing="3">SCIENTIFIC DISCOVERY ENGINE</text>
  <text x="450" y="148" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="15" fill="#0969da" opacity="0.8">ask a question &#xB7; spawn agents &#xB7; get evidence</text>

  <rect x="395" y="160" width="110" height="20" rx="10" fill="#f6f8fa" stroke="#d0d7de" stroke-width="0.5"/>
  <text x="450" y="174" text-anchor="middle" font-family="SF Mono,Menlo,monospace" font-size="10" fill="#656d76">v0.4 &#xB7; 11 roles</text>

  <rect x="1" y="1" width="898" height="198" rx="12" fill="none" stroke="#d0d7de" stroke-width="1"/>
</svg>
