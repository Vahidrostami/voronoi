<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3fb950"/>
      <stop offset="100%" style="stop-color:#56d364"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" rx="12" fill="url(#bg)"/>
  <rect x="1" y="1" width="798" height="448" rx="12" fill="none" stroke="#30363d" stroke-width="1"/>

  <!-- Title bar -->
  <rect width="800" height="36" rx="12" fill="#161b22"/>
  <rect y="24" width="800" height="12" fill="#161b22"/>
  <circle cx="20" cy="18" r="6" fill="#f85149"/>
  <circle cx="40" cy="18" r="6" fill="#d29922"/>
  <circle cx="60" cy="18" r="6" fill="#3fb950"/>
  <text x="400" y="22" text-anchor="middle" font-family="SF Mono,Menlo,monospace" font-size="12" fill="#8b949e">voronoi &#x2014; hypothesis-driven proof</text>

  <!-- ═══════ PHASE 1: Question (0s–3s) ═══════ -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="0.5s" dur="0.4s" fill="freeze"/>
    <text x="30" y="70" font-family="SF Mono,Menlo,monospace" font-size="13" fill="#8b949e">you</text>
    <text x="30" y="90" font-family="SF Mono,Menlo,monospace" font-size="14" fill="#e6edf3">Prove that EWC+Replay hybrid outperforms each mechanism alone on MNIST</text>
  </g>

  <!-- ═══════ PHASE 2: Classify (2s–4s) ═══════ -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="2s" dur="0.4s" fill="freeze"/>
    <text x="30" y="126" font-family="SF Mono,Menlo,monospace" font-size="13" fill="#58a6ff">voronoi</text>
    <text x="30" y="146" font-family="SF Mono,Menlo,monospace" font-size="14" fill="#8b949e">🏷️ Classified: </text>
    <text x="160" y="146" font-family="SF Mono,Menlo,monospace" font-size="14" font-weight="bold" fill="#bc8cff">Prove</text>
    <text x="225" y="146" font-family="SF Mono,Menlo,monospace" font-size="14" fill="#8b949e"> · rigor: </text>
    <text x="310" y="146" font-family="SF Mono,Menlo,monospace" font-size="14" font-weight="bold" fill="#d29922">Scientific</text>
  </g>

  <!-- ═══════ PHASE 3: Agents fan out (3.5s–6s) ═══════ -->
  <!-- Agent boxes -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="3.5s" dur="0.3s" fill="freeze"/>
    <text x="30" y="180" font-family="SF Mono,Menlo,monospace" font-size="13" fill="#58a6ff">voronoi</text>
    <text x="30" y="200" font-family="SF Mono,Menlo,monospace" font-size="14" fill="#8b949e">⚡ Pre-registered → dispatching 3 controlled experiments…</text>
  </g>

  <!-- Agent 1 -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="4.2s" dur="0.3s" fill="freeze"/>
    <rect x="30" y="216" width="230" height="44" rx="8" fill="#161b22" stroke="#30363d"/>
    <text x="46" y="234" font-family="SF Mono,Menlo,monospace" font-size="11" fill="#58a6ff">🔬 Baseline: sequential training</text>
    <rect x="46" y="244" width="0" height="4" rx="2" fill="url(#green)">
      <animate attributeName="width" values="0;198" begin="5s" dur="4s" fill="freeze"/>
    </rect>
  </g>

  <!-- Agent 2 -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="4.5s" dur="0.3s" fill="freeze"/>
    <rect x="280" y="216" width="230" height="44" rx="8" fill="#161b22" stroke="#30363d"/>
    <text x="296" y="234" font-family="SF Mono,Menlo,monospace" font-size="11" fill="#58a6ff">🔬 EWC alone vs baseline</text>
    <rect x="296" y="244" width="0" height="4" rx="2" fill="url(#green)">
      <animate attributeName="width" values="0;198" begin="5.3s" dur="3.5s" fill="freeze"/>
    </rect>
  </g>

  <!-- Agent 3 -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="4.8s" dur="0.3s" fill="freeze"/>
    <rect x="530" y="216" width="240" height="44" rx="8" fill="#161b22" stroke="#30363d"/>
    <text x="546" y="234" font-family="SF Mono,Menlo,monospace" font-size="11" fill="#58a6ff">🔬 EWC+Replay vs baseline</text>
    <rect x="546" y="244" width="0" height="4" rx="2" fill="url(#green)">
      <animate attributeName="width" values="0;208" begin="5.6s" dur="3s" fill="freeze"/>
    </rect>
  </g>

  <!-- ═══════ PHASE 4: Review + Results (8s–12s) ═══════ -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="9.5s" dur="0.4s" fill="freeze"/>
    <text x="30" y="290" font-family="SF Mono,Menlo,monospace" font-size="13" fill="#58a6ff">voronoi</text>
    <text x="30" y="310" font-family="SF Mono,Menlo,monospace" font-size="14" fill="#e6edf3">🏁 Proof #1 COMPLETE — hypothesis confirmed</text>
  </g>

  <!-- Finding bullets -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="10.2s" dur="0.3s" fill="freeze"/>
    <text x="30" y="332" font-family="SF Mono,Menlo,monospace" font-size="12" fill="#3fb950">• Baseline: 34% retention after 5 tasks ✅</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="10.8s" dur="0.3s" fill="freeze"/>
    <text x="30" y="352" font-family="SF Mono,Menlo,monospace" font-size="12" fill="#d29922">• EWC alone: d=0.34 vs baseline (p&lt;.05) marginal ❓</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="11.4s" dur="0.3s" fill="freeze"/>
    <text x="30" y="372" font-family="SF Mono,Menlo,monospace" font-size="12" fill="#3fb950">• EWC+Replay: d=1.47 vs baseline (p&lt;.001) CONFIRMED ✅</text>
  </g>

  <!-- PDF attachment -->
  <g opacity="0" filter="url(#glow)">
    <animate attributeName="opacity" values="0;1" begin="12s" dur="0.5s" fill="freeze"/>
    <rect x="30" y="396" width="310" height="26" rx="6" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
    <text x="46" y="414" font-family="SF Mono,Menlo,monospace" font-size="12" fill="#58a6ff">📎 report.pdf  ·  hypothesis confirmed</text>
  </g>

  <!-- Reviewed badge -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="12.5s" dur="0.4s" fill="freeze"/>
    <text x="30" y="440" font-family="SF Mono,Menlo,monospace" font-size="11" fill="#8b949e">Reviewed: Statistician &#x2705; &#xB7; Critic &#x2705; &#xB7; Methodologist &#x2705;</text>
  </g>

</svg>
